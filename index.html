<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Story Pipeline</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>LinkedIn Story Pipeline</h1>
    </header>

    <section id="landing-view">
      <p>
        Paste your Anthropic API key to get started. It's stored only in
        this browser's localStorage, and sent only to Anthropic's API.
      </p>
      <label for="api-key-input">Anthropic API key</label>
      <input
        type="password"
        id="api-key-input"
        placeholder="sk-ant-..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="test-connection-btn" type="button">Test connection</button>
      <p id="connection-status" role="status" aria-live="polite"></p>
    </section>

    <div id="app-shell" hidden>
      <nav id="main-nav">
        <button class="nav-link" data-view="board" type="button">Board</button>
        <button class="nav-link" data-view="settings" type="button">Settings</button>
      </nav>
      <main id="view-container">
        <section id="view-board">
          <h2>Board</h2>
          <p>Coming in a later phase.</p>
        </section>
        <section id="view-settings" hidden>
          <h2>Settings</h2>
          <p>Coming in a later phase.</p>
        </section>
      </main>
    </div>
  </div>

  <script src="linkConfig.js"></script>
  <script src="storage.js"></script>
  <script src="api.js"></script>
  <script src="onboarding.js"></script>
  <script src="pipeline.js"></script>
  <script src="draft.js"></script>
  <script src="learning.js"></script>
  <script src="settings.js"></script>
  <script src="app.js"></script>
</body>
</html>
